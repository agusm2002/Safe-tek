name: CI/CD Pipeline Local

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Build en la nube (GitHub)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: agusm2002/api-test:latest

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: agusm2002/web-test:latest

  # JOB 2: Deploy en TU Debian (M4 ARM64)
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull y Update
        run: |
          # 1. Entrar a la carpeta (Usamos ruta absoluta)
          cd /home/agus/docker/test_agus
          
          # 2. Bajar las imagenes (Usamos sudo para evitar errores de permisos)
          sudo docker compose pull
          
          # 3. Reiniciar contenedores
          sudo docker compose up -d
          
          # 4. Limpiar imagenes viejas para no llenar el disco de la VM
          sudo docker image prune -f
          
          # 5. Confirmacion en el log
          sudo docker ps