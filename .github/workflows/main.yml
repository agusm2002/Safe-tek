name: CI/CD Pipeline Local

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Build en la nube (GitHub)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: agusm2002/api-test:latest

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: agusm2002/web-test:latest

  # JOB 2: Deploy en TU Debian (M4 ARM64)
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Diagnostico y Permisos
        run: |
          echo "Verificando usuario..."
          whoami
          echo "Verificando acceso a Docker..."
          sudo docker ps
          echo "Verificando existencia de la carpeta..."
          ls -d /home/agus/docker/test_agus

      - name: Pull y Update
        run: |
          # 1. Entrar a la carpeta
          cd /home/agus/docker/test_agus

          # 2. Crear la red compartida del reverse proxy si no existe
          sudo docker network inspect company_prod_proxy_network >/dev/null 2>&1 || sudo docker network create company_prod_proxy_network
          
          # 3. Bajar las imagenes
          sudo docker compose pull
          
          # 4. Reiniciar contenedores
          sudo docker compose up -d
          
          # 5. Limpiar imagenes viejas
          sudo docker image prune -f
          
          # 6. Confirmacion final
          sudo docker ps